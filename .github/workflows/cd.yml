name: cd

on:
  release:
    types: [released]

jobs:
  # One job: every check that can reject a bad release (version == tag, lint,
  # types, tests, build of core + shims) runs before the publish step, so
  # nothing ships if any of them fail. npm has no skip-existing, so the publish
  # loop checks the registry per package, in dependency order (root first).
  release:
    permissions:
      id-token: write

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: set up node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # The tag tracks the root SDK's version (vX.Y.Z); a mismatch means a
      # package would publish under the wrong version, so nothing ships.
      - name: verify the root version matches the release tag
        run: |
          version=$(npm pkg get version | tr -d '"')
          test "$version" = "${GITHUB_REF_NAME#v}" \
            || { echo "root version $version != tag ${GITHUB_REF_NAME#v}"; exit 1; }

      - name: install
        run: npm ci

      - name: check linting
        run: npm run check

      - name: check types
        run: npm run type-check

      - name: run tests
        run: npm test

      - name: build core and shims
        run: |
          npm run build
          npm run build --workspaces --if-present

      # Root first (shims depend on it), then every packages/* discovered on
      # disk -- a new shim is covered the day it lands, no name hardcoded.
      # npm has no skip-existing: check the registry per package. An unchanged
      # package whose version is already on npm rides along without
      # republishing, and a re-run can finish a partial release. Private
      # packages are skipped (npm publish would error on them, not skip).
      - name: publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in . packages/*; do
            [ -f "$dir/package.json" ] || continue
            read -r pkg private < <(node -p "const p=require('./$dir/package.json'); p.name+'@'+p.version+' '+!!p.private")
            [ "$private" = true ] && { echo "skip $pkg (private)"; continue; }
            if npm view "$pkg" version >/dev/null 2>&1; then
              echo "skip $pkg (already published)"
            else
              (cd "$dir" && npm publish --provenance --access public)
            fi
          done
