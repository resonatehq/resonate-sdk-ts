# Temporary workflow to publish the supabase branch under the "supabase" npm tag.
# Remove this once the supabase code is merged to main.
name: Release Supabase

on:
  workflow_dispatch:
  push:
    branches:
      - supabase

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm install

      - name: Set prerelease version
        run: npm version "0.0.0-supabase-$GITHUB_SHA" --git-tag-version false

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --provenance --access public --tag supabase
